name: liot

services:
  app:
    env_file:
      - ./.env
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: liot-app:local
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      MQTT_URL: ${MQTT_URL}
      MQTT_EMBEDDED_BROKER: ${MQTT_EMBEDDED_BROKER:-false}
      MQTT_PORT: ${MQTT_PORT:-1883}
      APP_LOG_PATH: ${APP_LOG_PATH:-/app/logs/app.log}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liot}
      POSTGRES_USER: ${POSTGRES_USER:-liot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liot -d liot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    env_file:
      - ./.env
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MQTT_PORT:-1883}:1883"
    restart: unless-stopped

volumes:
  app_logs:
  postgres_data:
